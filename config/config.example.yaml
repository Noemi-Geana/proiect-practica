paths:
  downloads: "Downloads"
  media_root: "Media"
  documents: "Media/Documents"
  executables: "Media/Executables"
  pictures: "Media/Pictures"
  duplicates: "Media/Duplicates"
  unsorted: "Media/Unsorted"

subfolders:
  movies: "Movies"
  series: "Series"
  music: "Music"

extensions:
  video: [".mp4", ".mkv", ".avi", ".mov", ".flv"]
  audio: [".mp3", ".flac", ".wav", ".m4a"]
  documents: [".pdf", ".doc", ".docx", ".odt", ".txt"]
  executables: [".exe", ".sh", ".appimage", ".deb"]
  archives: [".zip", ".rar", ".7z"]
  subtitles: [".srt", ".sub"]
  pictures: [".jpg", ".jpeg", ".png", ".gif", ".webp"]
  incomplete: [".part", ".crdownload", ".tmp"]

api:
  omdb_key: "PUNE_AICI_CHEIA_TA"
  omdb_url: "http://www.omdbapi.com/"
  tmdb_key: ""
  cache_file: "config/metadata_cache.json"
  language: "en-US"

logging:
  log_file: "logs/organizer.log"
  level: "INFO"
  max_size_mb: 5
  backup_count: 3

history:
  history_file: "config/history.json"

stats:
  stats_file: "config/stats.json"

naming:
  movie_folder: "{title}"
  movie_file: "{title}"
  series_file: "{title} S{season:02d}E{episode:02d}"
  music_file: "{artist} - {track}"

media_locations:
  extra_roots: []

behavior:
  dry_run: false
  auto_delete_duplicates: false
  notifications_enabled: true
  extract_archives: true