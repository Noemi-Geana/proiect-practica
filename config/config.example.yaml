paths:
  downloads: "~/Downloads"
  media_root: "~/Media"
  documents: "~/Media/Documents"
  executables: "~/Media/Executables"
  pictures: "~/Media/Pictures"
  duplicates: "~/Media/Duplicates"
  unsorted: "~/Media/Unsorted"

subfolders:
  movies: "Movies"
  series: "Series"
  music: "Music"

extensions:
  video: [".mp4", ".mkv", ".avi", ".mov", ".flv", ".wmv"]
  audio: [".mp3", ".flac", ".wav", ".m4a", ".aac", ".ogg"]
  documents: [".pdf", ".doc", ".docx", ".odt", ".txt", ".xls", ".xlsx", ".ppt", ".pptx"]
  executables: [".exe", ".sh", ".appimage", ".deb", ".run", ".bin"]
  archives: [".zip", ".rar", ".7z", ".tar", ".gz"]
  subtitles: [".srt", ".sub", ".ass"]
  pictures: [".jpg", ".jpeg", ".png", ".gif", ".webp", ".bmp"]
  incomplete: [".part", ".crdownload", ".tmp", ".download"]

api:
  omdb_key: "PUNE_AICI_CHEIA_TA"
  omdb_url: "http://www.omdbapi.com/"
  cache_file: "config/metadata_cache.json"
  timeout_seconds: 5
  max_retries: 2

logging:
  log_file: "logs/organizer.log"
  level: "INFO"
  max_size_mb: 5
  backup_count: 3

history:
  history_file: "config/history.json"

stats:
  stats_file: "config/stats.json"

behavior:
  dry_run: false
  auto_delete_duplicates: false
  notifications_enabled: true
  extract_archives: true